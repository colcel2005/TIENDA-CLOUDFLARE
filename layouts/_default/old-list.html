<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <!-- Script de PayPal (Reemplaza TU_CLIENT_ID con el tuyo de PayPal Business) -->
    <script src="https://www.paypal.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 40px; }
        .contenedor { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .producto { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { text-align: center; color: #1a1a1a; }
        .precio { font-size: 20px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Mis 100 Artículos</h1>
    <div class="contenedor">
        {{ $csv := getCSV "," "data/productos.csv" }}
        {{ range $i, $r := $csv }}
        {{ if ne $i 0 }} <!-- Salta la cabecera del CSV -->
        <div class="producto">
            <h3>{{ index $r 1 }}</h3> <!-- Nombre -->
            <p class="precio">${{ index $r 2 }}</p> <!-- Precio -->
            <div id="paypal-button-{{ $i }}"></div>
            <script>
                paypal.Buttons({
                    createOrder: function(data, actions) {
                        return actions.order.create({
                            purchase_units: [{ amount: { value: '{{ index $r 2 }}' } }]
                        });
                    }
                }).render('#paypal-button-{{ $i }}');
            </script>
        </div>
        {{ end }}
        {{ end }}
    </div>
</body>
</html>
