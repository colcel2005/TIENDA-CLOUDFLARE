baseURL = '/'
languageCode = 'es'
title = 'Mi Tienda'
theme = ''

[security]
  [security.headers]
    contentSecurityPolicy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.paypal.com https://www.paypalobjects.com;
      style-src 'self' 'unsafe-inline' https://www.paypal.com;
      connect-src 'self' https://www.paypal.com https://www.sandbox.paypal.com;
      frame-src https://www.paypal.com https://www.sandbox.paypal.com;
      img-src 'self' https://www.paypal.com https://www.paypalobjects.com data:;
    """
